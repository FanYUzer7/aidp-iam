apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rubik-backend.fullname" . }}
  namespace: {{ include "rubik-backend.namespace" . }}
  labels:
    {{- include "rubik-backend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rubik-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rubik-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: rubik-config
        persistentVolumeClaim:
          claimName: {{ include "rubik-backend.fullname" . }}-config
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: rubik-config
          mountPath: /root
          subPath: root
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.config.port }}
          protocol: TCP
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          tcpSocket:
            port: {{ .Values.config.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          tcpSocket:
            port: {{ .Values.config.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
