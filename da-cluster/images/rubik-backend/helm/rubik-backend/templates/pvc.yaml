{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rubik-backend.fullname" . }}-config
  namespace: {{ include "rubik-backend.namespace" . }}
  labels:
    {{- include "rubik-backend.labels" . | nindent 4 }}
  {{- if .Values.persistence.allowExpansion }}
  annotations:
    volume.kubernetes.io/storage-provisioner: {{ .Values.persistence.storageClass | default "kubernetes.io/no-provisioner" }}
    volume.kubernetes.io/storage-class: {{ .Values.persistence.storageClass | default "standard" }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
  {{- if .Values.persistence.volumeBindingMode }}
  volumeBindingMode: {{ .Values.persistence.volumeBindingMode }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: "{{ .Values.persistence.storageClass }}"
  {{- end }}
{{- end }}
