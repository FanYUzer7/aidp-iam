replicaCount: 1

image:
  repository: rubik-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 43211

# 探针配置
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5

# 资源配置
resources:
  limits:
    cpu: 500m
  requests:
    cpu: 250m
    memory: 256Mi

# 运行时配置
config:
  host: "0.0.0.0"
  port: 43211

# namespace 配置（空则使用默认）
namespace: ""

# 持久化存储配置
persistence:
  enabled: true
  size: 1Gi
  # storageClass: ""  # 留空使用集群默认
  # volumeBindingMode: WaitForFirstConsumer  # 延迟绑定，支持动态扩容
  # allowExpansion: true  # 设为 true 允许动态扩容
