replicaCount: 1

image:
  repository: dataagent
  tag: 20260318
  pullPolicy: IfNotPresent

# 后端服务配置
backend:
  # 服务名称（必须是同 namespace 下的 Service，或使用完整 FQDN）
  serviceName: rubik-backend
  # 服务端口
  servicePort: 43211
  # API 路径
  apiPath: /api

# 后端完整 URL（由上述配置组合生成）
# 格式: http://<service>:<port><apiPath>
rubikBackendUrl: ""

service:
  type: NodePort
  port: 80
  nodePort: 32777

# 探针配置（dev 模式下使用 httpGet）
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

# 资源配置
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# 运行时配置
config:
  host: "0.0.0.0"
  port: 80

# namespace 配置（空则使用默认）
namespace: ""

# nginx 配置（通过 ConfigMap 管理，无需重建镜像即可更新）
nginx:
  config: |
    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # SPA fallback - 所有路由都返回 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 代理 - /kbApi/* 转发到后端
        location /kbApi/ {
            proxy_pass http://rubik-backend:43211/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 长超时用于 LLM 流式响应
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
