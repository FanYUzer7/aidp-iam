apiVersion: v1
kind: Service
metadata:
  name: {{ include "rubik-frontend.fullname" . }}
  namespace: {{ include "rubik-frontend.namespace" . }}
  labels:
    {{- include "rubik-frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    {{- if eq .Values.service.type "NodePort" }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
    protocol: TCP
    name: http
  selector:
    {{- include "rubik-frontend.selectorLabels" . | nindent 4 }}
