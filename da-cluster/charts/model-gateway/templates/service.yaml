apiVersion: v1
kind: Service
metadata:
  name: model-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: model-gateway
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: model-gateway